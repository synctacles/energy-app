# Ruff configuration for SYNCTACLES
# https://docs.astral.sh/ruff/configuration/

# Target Python version
target-version = "py312"

# Line length (same as black default)
line-length = 88

# Exclude paths
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "*.pyc",
    ".eggs",
    "build",
    "dist",
    "alembic/versions",
    "docs",
]

[lint]
# Enable rules
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]

# Ignore specific rules
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (FastAPI Depends)
    "B904",   # raise from (too noisy)
]

# Allow autofix for all rules
fixable = ["ALL"]
unfixable = []

[lint.isort]
known-first-party = ["synctacles_db"]

[format]
# Use double quotes
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Unix line endings
line-ending = "lf"
