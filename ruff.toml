# Ruff configuration for SYNCTACLES
# https://docs.astral.sh/ruff/configuration/

# Target Python version
target-version = "py312"

# Line length (same as black default)
line-length = 88

# Exclude paths
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "*.pyc",
    ".eggs",
    "build",
    "dist",
    "alembic/versions",
    "docs",
    # Archive/deprecated code (not actively maintained)
    "**/archive/**",
    # Incomplete test snippets
    "tests/unit/integration_snippet.py",
]

[lint]
# Enable rules
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]

# Ignore specific rules
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (FastAPI Depends)
    "B904",   # raise from (too noisy)
    # Whitespace issues (cosmetic, not blocking)
    "W291",   # trailing-whitespace
    "W293",   # blank-line-with-whitespace
    # Style preferences (not critical)
    "E712",   # true-false-comparison (assert x == True is fine in tests)
    "E402",   # module-import-not-at-top-of-file (needed for env setup)
    "UP031",  # printf-string-formatting (style preference)
    "C416",   # unnecessary-comprehension (minor)
    "B905",   # zip-without-explicit-strict (Python 3.10+ style)
    "F841",   # unused-variable (often intentional for clarity)
]

# Allow autofix for all rules
fixable = ["ALL"]
unfixable = []

[lint.isort]
known-first-party = ["synctacles_db"]

[lint.per-file-ignores]
# Allow unused imports in __init__.py (re-exports)
"__init__.py" = ["F401"]

[format]
# Use double quotes
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Unix line endings
line-ending = "lf"
