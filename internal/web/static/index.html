<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synctacles Energy</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --bg-card: #ffffff;
            --text: #1a1a2e;
            --text-muted: #666;
            --text-faint: #888;
            --border: #e5e7eb;
            --shadow: rgba(0,0,0,0.08);
            --shadow-hover: rgba(0,0,0,0.12);
            --accent: #1a73e8;
            --spinner-track: #e5e7eb;
            --input-bg: #f9fafb;
            --input-border: #d1d5db;
        }
        .dark {
            --bg: #111418;
            --bg-card: #1e2128;
            --text: #e4e6ea;
            --text-muted: #9ca3af;
            --text-faint: #6b7280;
            --border: #2d3139;
            --shadow: rgba(0,0,0,0.3);
            --shadow-hover: rgba(0,0,0,0.4);
            --accent: #4a9eff;
            --spinner-track: #374151;
            --input-bg: #282c34;
            --input-border: #3d4250;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); padding: 16px;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 900px; margin: 0 auto; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { height: 28px; width: auto; }
        .header .meta { font-size: 0.75em; color: var(--text-faint); }
        .header-btn {
            background: none; border: 1px solid var(--border); border-radius: 8px;
            cursor: pointer; padding: 6px 8px; font-size: 1.1em; color: var(--text-muted);
            transition: background 0.2s; text-decoration: none; display: inline-flex; align-items: center;
        }
        .header-btn:hover { background: var(--bg-card); }

        /* Source bar — two-line layout */
        .source-bar {
            padding: 6px 0; margin-bottom: 8px; font-size: 0.72em; color: var(--text-faint);
        }
        .source-summary {
            display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
            padding-bottom: 4px; margin-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }
        .source-label { font-weight: 500; color: var(--text-muted); }
        .source-active-name { color: var(--accent); font-weight: 600; }
        .source-quality {
            display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.95em;
        }
        .source-quality.live { background: #d1fae5; color: #065f46; }
        .source-quality.cached { background: #fef3c7; color: #92400e; }
        .dark .source-quality.live { background: #064e3b; color: #6ee7b7; }
        .dark .source-quality.cached { background: #78350f; color: #fcd34d; }
        .source-age { color: var(--text-faint); }
        .source-chain {
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        .source-chain-item { display: flex; align-items: center; gap: 3px; }
        .source-dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0;
        }
        .source-dot.healthy { background: #22c55e; }
        .source-dot.unhealthy { background: #ef4444; }
        .source-dot.unknown { background: #9ca3af; }
        .source-chain-name { color: var(--text-faint); }
        .source-chain-name.active { color: var(--accent); font-weight: 600; }
        .source-chain-name.primary { font-weight: 500; }
        .source-serving { color: var(--accent); font-size: 0.9em; }
        .chart-source { font-weight: 400; font-size: 0.85em; color: var(--text-faint); }

        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
        .tab {
            padding: 8px 16px; cursor: pointer; font-size: 0.85em; font-weight: 500;
            color: var(--text-muted); border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* Dashboard Grid — 3 columns */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
        .card {
            background: var(--bg-card); border-radius: 12px; padding: 16px;
            box-shadow: 0 1px 3px var(--shadow); transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px var(--shadow-hover); }
        .card-label { font-size: 0.75em; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .card-value { font-size: 1.8em; font-weight: 700; }
        .card-sub { font-size: 0.8em; color: var(--text-muted); margin-top: 4px; }

        .action-go { color: #0d9488; }
        .action-wait { color: #d97706; }
        .action-avoid { color: #dc2626; }
        .action-badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.7em; font-weight: 600; margin-top: 4px;
        }
        .badge-go { background: #d1fae5; color: #065f46; }
        .badge-wait { background: #fef3c7; color: #92400e; }
        .badge-avoid { background: #fee2e2; color: #991b1b; }
        .dark .badge-go { background: #064e3b; color: #6ee7b7; }
        .dark .badge-wait { background: #78350f; color: #fcd34d; }
        .dark .badge-avoid { background: #7f1d1d; color: #fca5a5; }

        .chart-card { grid-column: 1 / -1; }
        .chart-container { position: relative; height: 200px; margin-top: 8px; }
        canvas { width: 100% !important; height: 100% !important; }

        .stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; }
        .stat { text-align: center; flex: 1; min-width: 80px; }
        .stat-val { font-size: 1.1em; font-weight: 600; }
        .stat-label { font-size: 0.7em; color: var(--text-faint); }

        /* Settings */
        .settings-section { margin-bottom: 24px; }
        .settings-section h3 {
            font-size: 0.9em; color: var(--accent); margin-bottom: 12px;
            padding-bottom: 6px; border-bottom: 1px solid var(--border);
        }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 0.8em; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
        .form-input, .form-select {
            width: 100%; padding: 8px 12px; border: 1px solid var(--input-border);
            border-radius: 8px; font-size: 0.85em; background: var(--input-bg); color: var(--text);
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
        .form-input::placeholder { color: var(--text-faint); }
        .form-hint { font-size: 0.72em; color: var(--text-faint); margin-top: 3px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .toggle-row { display: flex; align-items: center; justify-content: space-between; }
        .toggle {
            position: relative; width: 44px; height: 24px; background: var(--input-border);
            border-radius: 12px; cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .toggle.on { background: var(--accent); }
        .toggle::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 20px; height: 20px; background: white; border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle.on::after { transform: translateX(20px); }
        .btn-save {
            background: var(--accent); color: white; border: none; padding: 10px 24px;
            border-radius: 8px; font-size: 0.85em; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.9; }
        .btn-save:disabled { opacity: 0.5; cursor: default; }
        .save-status { font-size: 0.8em; color: #0d9488; margin-left: 12px; }
        .save-row { display: flex; align-items: center; margin-top: 16px; }

        /* License / registration badge */
        .license-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: 600;
        }
        .license-free { background: #e5e7eb; color: #374151; }
        .license-pro { background: #dbeafe; color: #1d4ed8; }
        .dark .license-free { background: #374151; color: #d1d5db; }
        .dark .license-pro { background: #1e3a5f; color: #93c5fd; }

        /* Registration nudge banner */
        .reg-nudge {
            background: linear-gradient(135deg, #eff6ff, #dbeafe);
            border: 1px solid #93c5fd; border-radius: 10px;
            padding: 12px 16px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            font-size: 0.82em;
        }
        .dark .reg-nudge { background: linear-gradient(135deg, #1e3a5f22, #1e2a4a44); border-color: #3b82f6; }
        .reg-nudge-text { color: var(--text); line-height: 1.4; }
        .reg-nudge-text strong { color: var(--accent); }
        .reg-nudge-link {
            flex-shrink: 0; padding: 6px 14px; background: var(--accent); color: white;
            text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 0.9em;
            white-space: nowrap;
        }
        .locked-note {
            font-size: 0.72em; color: var(--text-faint); margin-top: 4px;
        }

        .loading { text-align: center; padding: 40px; color: var(--text-faint); }
        .loading .spinner {
            width: 32px; height: 32px; border: 3px solid var(--spinner-track);
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .tab-page { display: none; }
        .tab-page.active { display: block; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .card-value { font-size: 1.4em; }
            .form-row { grid-template-columns: 1fr; }
        }

        /* Feedback tab */
        .feedback-section { margin-bottom: 24px; }
        .feedback-section h3 {
            color: var(--accent); font-size: 1em; font-weight: 600;
            margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
        }
        .star-rating { display: flex; gap: 4px; margin-bottom: 10px; }
        .star-rating .star {
            font-size: 2em; cursor: pointer; color: var(--text-faint);
            transition: color 0.15s; user-select: none;
        }
        .star-rating .star.hovered,
        .star-rating .star.selected { color: #f59e0b; }
        .star-label { font-size: 0.85em; color: var(--text-muted); margin-bottom: 10px; min-height: 1.2em; }
        .feedback-textarea {
            width: 100%; min-height: 80px; padding: 8px 10px; border: 1px solid var(--input-border);
            border-radius: 6px; background: var(--input-bg); color: var(--text); font: inherit;
            resize: vertical;
        }
        .feedback-input {
            width: 100%; padding: 8px 10px; border: 1px solid var(--input-border);
            border-radius: 6px; background: var(--input-bg); color: var(--text); font: inherit;
            margin-bottom: 8px;
        }
        .btn-submit {
            margin-top: 10px; padding: 8px 20px; background: var(--accent); color: #fff;
            border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9em;
        }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .feedback-msg { margin-top: 8px; font-size: 0.85em; min-height: 1.2em; }
        .feedback-msg.success { color: #0d9488; }
        .feedback-msg.error { color: #dc2626; }
        .sysinfo-box {
            background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px;
            padding: 12px 14px; font-size: 0.82em; color: var(--text-muted);
        }
        .sysinfo-box dt { font-weight: 600; color: var(--text); display: inline; }
        .sysinfo-box dt::after { content: ' '; }
        .sysinfo-box dd { display: inline; margin: 0; }
        .sysinfo-box dd::after { content: '\A'; white-space: pre; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <img class="header-logo" id="headerLogo" src="static/logo-full-light.png" alt="Synctacles Energy">
            </div>
            <div style="display:flex;align-items:center;gap:10px">
                <div class="meta" id="meta" data-i18n="common.loading">Loading...</div>
                <button class="header-btn" id="addonInfo" title="App Info, Changelog & Restart">&#9881;</button>
                <button class="header-btn" id="themeToggle" title="Toggle dark mode">&#9789;</button>
            </div>
        </div>

        <div class="source-bar" id="sourceBar"></div>

        <div class="tabs">
            <div class="tab active" data-tab="dashboard" data-i18n="nav.dashboard">Dashboard</div>
            <div class="tab" data-tab="settings" data-i18n="nav.settings">Settings</div>
            <div class="tab" data-tab="feedback" data-i18n="nav.feedback">Feedback</div>
        </div>

        <div id="page-dashboard" class="tab-page active">
            <div id="content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p data-i18n="dashboard.fetching_prices">Fetching energy prices...</p>
                </div>
            </div>
        </div>

        <div id="page-settings" class="tab-page">
            <div id="settingsContent">
                <div class="loading">
                    <div class="spinner"></div>
                    <p data-i18n="settings.loading_settings">Loading settings...</p>
                </div>
            </div>
        </div>

        <div id="page-feedback" class="tab-page">
            <div class="card" style="margin-bottom:16px">
                <div class="feedback-section">
                    <h3 data-i18n="feedback.rate_app">Rate this app</h3>
                    <div class="star-rating" id="starRating">
                        <span class="star" data-value="1">&#9733;</span>
                        <span class="star" data-value="2">&#9733;</span>
                        <span class="star" data-value="3">&#9733;</span>
                        <span class="star" data-value="4">&#9733;</span>
                        <span class="star" data-value="5">&#9733;</span>
                    </div>
                    <div class="star-label" id="starLabel"></div>
                    <textarea class="feedback-textarea" id="ratingComment" data-i18n-placeholder="feedback.optional_comment" placeholder="Optional comment..." rows="3"></textarea>
                    <br>
                    <button class="btn-submit" id="btnRating" disabled data-i18n="feedback.submit_rating">Submit Rating</button>
                    <div class="feedback-msg" id="ratingMsg"></div>
                </div>

                <div class="feedback-section">
                    <h3 data-i18n="feedback.report_bug">Report a Bug</h3>
                    <input class="feedback-input" id="bugTitle" data-i18n-placeholder="feedback.bug_title_placeholder" placeholder="Short summary of the issue" maxlength="200">
                    <textarea class="feedback-textarea" id="bugDescription" data-i18n-placeholder="feedback.bug_desc_placeholder" placeholder="Describe what happened and what you expected..." rows="5"></textarea>
                    <br>
                    <button class="btn-submit" id="btnBug" data-i18n="feedback.submit_bug">Submit Bug Report</button>
                    <div class="feedback-msg" id="bugMsg"></div>
                </div>

                <div class="feedback-section">
                    <h3 data-i18n="feedback.system_info">System Info</h3>
                    <div class="sysinfo-box" id="sysInfoBox" data-i18n="common.loading">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // --- i18n ---
    var _i18n = {};
    var _lang = 'en';
    var _detectedLocale = 'en';

    function t(key, fallback) {
        var keys = key.split('.');
        var val = _i18n;
        for (var i = 0; i < keys.length; i++) {
            if (val && typeof val === 'object' && keys[i] in val) {
                val = val[keys[i]];
            } else {
                return fallback || key;
            }
        }
        return typeof val === 'string' ? val : (fallback || key);
    }

    function tReplace(key, replacements, fallback) {
        var str = t(key, fallback);
        for (var k in replacements) {
            str = str.replace('{' + k + '}', replacements[k]);
        }
        return str;
    }

    async function initI18n(lang) {
        _lang = lang || 'en';
        try {
            var resp = await fetch('static/i18n/' + _lang + '.json');
            if (resp.ok) {
                _i18n = await resp.json();
            } else {
                // Fallback to English
                if (_lang !== 'en') {
                    resp = await fetch('static/i18n/en.json');
                    if (resp.ok) _i18n = await resp.json();
                }
            }
        } catch (e) {
            console.warn('i18n load failed:', e.message);
        }
        // Apply to data-i18n elements
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            el.textContent = t(el.getAttribute('data-i18n'));
        });
        // Apply to data-i18n-placeholder elements
        document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
            el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
        });
    }

    // --- Theme ---
    var isDark = localStorage.getItem('theme') === 'dark' ||
        (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);

    function applyTheme() {
        document.body.classList.toggle('dark', isDark);
        var logo = document.getElementById('headerLogo');
        if (logo) logo.src = isDark ? 'static/logo-full-dark.jpg' : 'static/logo-full-light.png';
        document.getElementById('themeToggle').innerHTML = isDark ? '&#9788;' : '&#9789;';
    }
    applyTheme();

    document.getElementById('addonInfo').onclick = function() {
        var slug = window._addonSlug || '308ee12f_synctacles_energy';
        window.top.location.href = '/hassio/addon/' + slug + '/info';
    };

    document.getElementById('themeToggle').onclick = function() {
        isDark = !isDark;
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        applyTheme();
        if (lastPrices) drawChart(lastPrices, lastAvg);
    };

    // --- Source Health ---
    var sourceNames = {
        'easyenergy': 'EasyEnergy', 'frank': 'Frank Energie', 'energycharts': 'Energy-Charts',
        'energidataservice': 'Energi Data Service', 'awattar': 'aWATTar', 'omie': 'OMIE',
        'spothinta': 'spot-hinta.fi', 'enever': 'Enever'
    };

    var supplierNames = {
        'anwb': 'ANWB', 'budget': 'Budget', 'coolblue': 'Coolblue', 'easyenergy': 'EasyEnergy',
        'energiedirect': 'Energie Direct', 'energievanons': 'Energie van Ons', 'energiek': 'Energiek',
        'energyzero': 'EnergyZero', 'essent': 'Essent', 'frank': 'Frank', 'groenestroom': 'Groene Stroom',
        'hegg': 'Hegg', 'innova': 'Innova', 'mijndomein': 'Mijn Domein', 'nextenergy': 'NextEnergy',
        'pureenergie': 'Pure Energie', 'quatt': 'Quatt', 'samsam': 'SamSam', 'tibber': 'Tibber',
        'vandebron': 'Vandebron', 'vattenfall': 'Vattenfall', 'vrijopnaam': 'Vrij op naam',
        'wout': 'Wout', 'zonneplan': 'Zonneplan'
    };

    function sourceLabel(name, lev) {
        var label = sourceNames[name] || name;
        if (name === 'enever' && lev) {
            label += ' (' + (supplierNames[lev] || lev) + ')';
        }
        return label;
    }

    function timeAgo(isoStr) {
        if (!isoStr) return '';
        var ms = Date.now() - new Date(isoStr).getTime();
        if (ms < 60000) return t('source.just_now', 'just now');
        if (ms < 3600000) return tReplace('source.m_ago', {n: Math.floor(ms / 60000)}, Math.floor(ms / 60000) + 'm ago');
        var h = Math.floor(ms / 3600000);
        if (h < 24) return tReplace('source.h_ago', {n: h}, h + 'h ago');
        return tReplace('source.d_ago', {n: Math.floor(h / 24)}, Math.floor(h / 24) + 'd ago');
    }

    async function loadSources() {
        try {
            var resp = await fetch('api/sources');
            var d = await resp.json();
            if (!d.sources || d.sources.length === 0) {
                document.getElementById('sourceBar').innerHTML = '';
                return;
            }

            var ai = d.active_info;
            var html = '';

            // Line 1: Active source summary — what the user is actually seeing
            if (ai) {
                var srcLabel = sourceLabel(ai.source, d.leverancier);
                var qualLabel = ai.quality;
                var qualCls = ai.quality;
                if (ai.from_mem_cache && ai.quality === 'live') {
                    // Data from memory cache — still live quality but show age
                    var age = timeAgo(ai.fetched_at);
                    qualLabel = 'live';
                    if (age && age !== t('source.just_now', 'just now')) qualLabel += ' (cached)';
                }
                html += '<div class="source-summary">' +
                    '<span class="source-label">' + t('source.prices_from', 'Prices from:') + '</span> ' +
                    '<span class="source-active-name">' + srcLabel + '</span> ' +
                    '<span class="source-quality ' + qualCls + '">' + qualLabel + '</span>' +
                    (ai.fetched_at ? '<span class="source-age">' + timeAgo(ai.fetched_at) + '</span>' : '') +
                    '</div>';
            }

            // Line 2: Source chain — all sources with health and tier
            html += '<div class="source-chain">';
            html += '<span class="source-label">' + t('source.chain', 'Chain:') + '</span>';
            d.sources.forEach(function(s) {
                var dotCls = s.healthy ? 'healthy' : 'unhealthy';
                var nameCls = 'source-chain-name';
                if (s.active) nameCls += ' active';
                if (s.primary) nameCls += ' primary';
                var label = s.tier + '. ' + sourceLabel(s.name, s.name === 'enever' ? d.leverancier : '');
                var extra = '';
                if (s.active) extra = ' <span class="source-serving">' + t('source.serving', '[serving]') + '</span>';
                else if (s.last_success) extra = ' <span class="source-age">' + timeAgo(s.last_success) + '</span>';
                html += '<span class="source-chain-item">' +
                    '<span class="source-dot ' + dotCls + '"></span>' +
                    '<span class="' + nameCls + '">' + label + extra + '</span></span>';
            });
            html += '</div>';

            document.getElementById('sourceBar').innerHTML = html;
        } catch (e) { console.warn('source health load failed:', e.message); }
    }
    loadSources();
    setInterval(loadSources, 60000);

    // --- Tabs ---
    var tabs = document.querySelectorAll('.tab');
    tabs.forEach(function(tab) {
        tab.onclick = function() {
            tabs.forEach(function(tb) { tb.classList.remove('active'); });
            tab.classList.add('active');
            document.querySelectorAll('.tab-page').forEach(function(p) { p.classList.remove('active'); });
            document.getElementById('page-' + tab.getAttribute('data-tab')).classList.add('active');
            if (tab.getAttribute('data-tab') === 'settings' && !settingsLoaded) loadSettings();
            if (tab.getAttribute('data-tab') === 'feedback' && !feedbackLoaded) loadFeedbackSysInfo();
        };
    });

    function buildTaxBreakdownCard(consumerPriceEUR, zone) {
        var profile = taxProfiles[zone];
        if (!profile) {
            // No tax profile - skip breakdown card
            return '';
        }

        // Reverse-calculate wholesale from consumer price
        // consumer = (wholesale * 1.0 + energy_tax + surcharges) * (1 + VAT)
        // wholesale = (consumer / (1 + VAT)) - energy_tax - surcharges
        var subtotal = consumerPriceEUR / (1 + profile.vat);
        var wholesale = subtotal - profile.energy_tax - profile.surcharges;
        var vatAmount = consumerPriceEUR - subtotal;

        // Format in cents for display
        var wCent = formatPrice(wholesale);
        var eCent = formatPrice(profile.energy_tax);
        var sCent = formatPrice(profile.surcharges);
        var subCent = formatPrice(subtotal);
        var vCent = formatPrice(vatAmount);
        var totCent = formatPrice(consumerPriceEUR);

        var html = '<div class="card" style="grid-column: 1 / -1;">' +
            '<div class="card-label">' + t('tax.title', 'Tax Breakdown') + ' (' + profile.name + ')' +
                '<span style="font-weight:normal;color:var(--text-faint);margin-left:8px">' + t('tax.how_calculated', 'How your price is calculated') + '</span>' +
            '</div>' +
            '<div style="margin-top:12px;display:grid;grid-template-columns:1fr auto;gap:8px 16px;font-size:0.85em;">';

        // Wholesale
        html += '<div style="color:var(--text-muted)">' + t('tax.wholesale_price', 'Wholesale price') + '</div>' +
                '<div style="text-align:right;font-weight:600">' + wCent + ' ' + t('dashboard.ct_kwh', 'ct/kWh') + '</div>';

        // Energy tax
        if (profile.energy_tax > 0) {
            html += '<div style="color:var(--text-muted)">' + t('tax.energy_tax', 'Energy tax (excl. VAT)') + '</div>' +
                    '<div style="text-align:right;font-weight:600">+ ' + eCent + ' ' + t('dashboard.ct_kwh', 'ct/kWh') + '</div>';
        } else {
            html += '<div style="color:#0d9488">' + t('tax.energy_tax_free', 'Energy tax (FREE for households!)') + '</div>' +
                    '<div style="text-align:right;font-weight:600;color:#0d9488">€0.00</div>';
        }

        // Surcharges
        if (profile.surcharges > 0) {
            html += '<div style="color:var(--text-muted)">' + t('tax.surcharges', 'Surcharges (levies)') + '</div>' +
                    '<div style="text-align:right;font-weight:600">+ ' + sCent + ' ' + t('dashboard.ct_kwh', 'ct/kWh') + '</div>';
        }

        // Subtotal line
        html += '<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;font-weight:500">' + t('tax.subtotal', 'Subtotal (before VAT)') + '</div>' +
                '<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px;text-align:right;font-weight:600">' + subCent + ' ' + t('dashboard.ct_kwh', 'ct/kWh') + '</div>';

        // VAT
        html += '<div style="color:var(--text-muted)">' + tReplace('tax.vat', {pct: (profile.vat * 100).toFixed(0)}, 'VAT (' + (profile.vat * 100).toFixed(0) + '%)') + '</div>' +
                '<div style="text-align:right;font-weight:600">+ ' + vCent + ' ' + t('dashboard.ct_kwh', 'ct/kWh') + '</div>';

        // Total line (commodity only - excludes network and supplier costs)
        html += '<div style="border-top:2px solid var(--accent);padding-top:8px;margin-top:4px;font-weight:700;font-size:1.1em">' + t('tax.commodity_price', 'Energy commodity price') + '</div>' +
                '<div style="border-top:2px solid var(--accent);padding-top:8px;margin-top:4px;text-align:right;font-weight:700;font-size:1.1em;color:var(--accent)">' + totCent + ' ' + t('dashboard.ct_kwh', 'ct/kWh') + '</div>';

        // Disclaimer about excluded costs
        html += '<div style="grid-column:1 / -1;margin-top:12px;padding:8px;background:rgba(251,191,36,0.1);border-left:3px solid #f59e0b;border-radius:4px;font-size:0.75em;color:var(--text-muted)">' +
                t('tax.note', 'Your actual electricity bill includes additional fixed costs not shown here: network delivery (~5-10 ct/kWh) and supplier margin (~1-2 ct/kWh). This breakdown shows only the hour-variable energy commodity price.') + '</div>';

        html += '</div></div>';
        return html;
    }

    function drawChart(prices, avg) {
        var canvas = document.getElementById('priceChart');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');

        var rect = canvas.parentElement.getBoundingClientRect();
        var dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        var W = rect.width, H = rect.height;

        var vals = prices.map(function(p) { return p.price * 100; });
        var hours = prices.map(function(p) { return p.hour; });
        var avgCent = avg * 100;
        var minV = Math.min.apply(null, vals) * 0.9;
        var maxV = Math.max.apply(null, vals) * 1.1;
        var range = maxV - minV || 1;

        var pad = { top: 10, right: 10, bottom: 24, left: 36 };
        var cW = W - pad.left - pad.right;
        var cH = H - pad.top - pad.bottom;
        var barW = cW / vals.length;

        ctx.clearRect(0, 0, W, H);

        var now = new Date();
        var currentHour = String(now.getUTCHours()).padStart(2, '0') + ':00';

        var dark = isDark;
        var avgLineColor = dark ? '#6b7280' : '#9ca3af';
        var labelColor = dark ? '#9ca3af' : '#888';
        var barNormal = dark ? '#3b82f6' : '#93c5fd';
        var barCurrent = dark ? '#4a9eff' : '#1a73e8';
        var barBelow = dark ? '#34d399' : '#6ee7b7';
        var barAbove = dark ? '#f87171' : '#fca5a5';

        // Average line
        var avgY = pad.top + cH - ((avgCent - minV) / range) * cH;
        ctx.strokeStyle = avgLineColor;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(pad.left, avgY);
        ctx.lineTo(W - pad.right, avgY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = avgLineColor;
        ctx.font = '10px sans-serif';
        ctx.fillText(t('dashboard.avg', 'avg').toLowerCase(), pad.left + 2, avgY - 3);

        // Bars
        for (var i = 0; i < vals.length; i++) {
            var x = pad.left + i * barW + 1;
            var h = ((vals[i] - minV) / range) * cH;
            var y = pad.top + cH - h;
            var w = barW - 2;

            var isCurrent = hours[i] === currentHour;
            var isBelow = vals[i] <= avgCent * 0.85;
            var isAbove = vals[i] >= avgCent * 1.20;

            if (isCurrent) {
                ctx.fillStyle = barCurrent;
            } else if (isBelow) {
                ctx.fillStyle = barBelow;
            } else if (isAbove) {
                ctx.fillStyle = barAbove;
            } else {
                ctx.fillStyle = barNormal;
            }

            ctx.fillRect(x, y, w, h);

            if (i % 3 === 0) {
                ctx.fillStyle = labelColor;
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(hours[i], x + w / 2, H - 4);
            }
        }

        // Y-axis labels
        ctx.fillStyle = labelColor;
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(maxV.toFixed(0), pad.left - 4, pad.top + 10);
        ctx.fillText(minV.toFixed(0), pad.left - 4, H - pad.bottom);
    }

    function renderPlanOptions(currentPlan, hasEneverToken) {
        if (!planData || !planData.groups) return '<option value="">' + t('common.loading', 'Loading...') + '</option>';
        var html = '';
        planData.groups.forEach(function(group) {
            var plans = group.plans.filter(function(p) {
                // Hide Enever plans when no token is configured
                if (!hasEneverToken && p.enever_supplier) return false;
                return true;
            });
            if (plans.length === 0) return;
            html += '<optgroup label="' + esc(group.name) + '">';
            plans.forEach(function(p) {
                var label = p.name;
                if (p.enever_supplier) label += ' (via Enever)';
                html += '<option value="' + esc(p.id) + '"' + (p.id === currentPlan ? ' selected' : '') + '>' + esc(label) + '</option>';
            });
            html += '</optgroup>';
        });
        return html;
    }

                '</div>' +
            '</div>' +

            '<div class="settings-section">' +
                '<h3>' + t('settings.thresholds', 'Thresholds') + '</h3>' +
                '<div class="form-row">' +
                    '<div class="form-group">' +
                        '<label class="form-label">' + t('settings.go_threshold', 'GO Threshold (%)') + '</label>' +
                        '<input class="form-input" id="cfg-go" type="number" step="1" value="' + (c.go_threshold || -15) + '">' +
                        '<div class="form-hint">' + t('settings.go_threshold_hint', 'Below average % to recommend GO') + '</div>' +
                    '</div>' +
                    '<div class="form-group">' +
                        '<label class="form-label">' + t('settings.avoid_threshold', 'AVOID Threshold (%)') + '</label>' +
                        '<input class="form-input" id="cfg-avoid" type="number" step="1" value="' + (c.avoid_threshold || 20) + '">' +
                        '<div class="form-hint">' + t('settings.avoid_threshold_hint', 'Above average % to recommend AVOID') + '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="form-group">' +
                    '<label class="form-label">' + t('settings.best_window_duration', 'Best Window Duration (hours)') + '</label>' +
                    '<input class="form-input" id="cfg-bw" type="number" min="1" max="8" step="1" value="' + (c.best_window_hours || 3) + '">' +
                    '<div class="form-hint">' + t('settings.best_window_hint', 'Duration of the cheapest contiguous window (1-8 hours, default 3)') + '</div>' +
                '</div>' +
            '</div>' +

            '<div class="settings-section">' +
                '<h3>' + t('settings.advanced', 'Advanced') + '</h3>' +
                '<div class="form-group">' +
                    '<label class="form-label">' + t('settings.power_sensor', 'Power Sensor Entity') + '</label>' +
                    '<input class="form-input" id="cfg-power" type="text" placeholder="' + powerPlaceholder + '" value="' + esc(c.power_sensor || '') + '">' +
                    '<div class="form-hint">' + powerHint + '</div>' +
                '</div>' +
                '<div class="form-group">' +
                    '<div class="toggle-row">' +
                        '<span class="form-label" style="margin:0">' + t('settings.debug_mode', 'Debug Mode') + '</span>' +
                        '<div class="toggle' + (c.debug_mode ? ' on' : '') + '" id="cfg-debug-toggle"></div>' +
                    '</div>' +
                '</div>' +
            '</div>' +

            '<div class="save-row">' +
                '<button class="btn-save" id="btnSave">' + t('settings.save_settings', 'Save Settings') + '</button>' +
                '<span class="save-status" id="saveStatus"></span>' +
            '</div>';

        // Bind events
        document.getElementById('cfg-plan').onchange = function() {
            var eneverSection = document.getElementById('enever-fields');
            var customSection = document.getElementById('custom-fields');
            eneverSection.style.display = selectedPlanIsNL() ? '' : 'none';
            customSection.style.display = selectedPlanIsCustom() ? '' : 'none';
        };
        var eneverTokenEl = document.getElementById('cfg-enever-token');
        if (eneverTokenEl) {
            eneverTokenEl.oninput = function() {
                refreshPlanDropdown();
            };
        }
        document.getElementById('cfg-debug-toggle').onclick = function() {
            this.classList.toggle('on');
        };
        document.getElementById('btnSave').onclick = saveSettings;
    }

    function esc(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

    async function saveSettings() {
        var btn = document.getElementById('btnSave');
        var status = document.getElementById('saveStatus');
        btn.disabled = true;
        status.textContent = t('settings.saving', 'Saving...');
        status.style.color = 'var(--text-muted)';

        var payload = {
            plan: document.getElementById('cfg-plan').value,
            go_threshold: parseFloat(document.getElementById('cfg-go').value),
            avoid_threshold: parseFloat(document.getElementById('cfg-avoid').value),
            best_window_hours: parseInt(document.getElementById('cfg-bw').value) || 3,
            license_key: document.getElementById('cfg-license').value.trim(),
            power_sensor: document.getElementById('cfg-power').value.trim(),
            debug_mode: document.getElementById('cfg-debug-toggle').classList.contains('on')
        };

        // Always include Enever token for NL plans
        var eneverTokenEl = document.getElementById('cfg-enever-token');
        if (eneverTokenEl) {
            payload.enever_token = eneverTokenEl.value.trim();
        }

        // Include custom fields if custom plan
        if (payload.plan === 'custom') {
            payload.zone = document.getElementById('cfg-zone').value;
            payload.coefficient = parseFloat(document.getElementById('cfg-coeff').value) || 0;
        }

        try {
            var resp = await fetch('api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            var result = await resp.json();
            if (resp.ok) {
                status.textContent = t('settings.saved', 'Saved! Restart app for source changes to take effect.');
                status.style.color = '#0d9488';
                currentConfig = Object.assign(currentConfig, payload);
            } else {
                status.textContent = t('settings.save_error', 'Could not save settings. Please check your configuration and try again.');
                status.style.color = '#dc2626';
            }
        } catch (err) {
            status.textContent = t('settings.connection_error', 'Connection error');
            status.style.color = '#dc2626';
        }
        btn.disabled = false;
    }

    // --- Feedback ---
    var feedbackLoaded = false;
    var selectedRating = 0;
    function getStarLabel(n) {
        if (n < 1 || n > 5) return '';
        return t('feedback.stars.' + n, ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'][n]);
    }
    var stars = document.querySelectorAll('#starRating .star');
    var starLabel = document.getElementById('starLabel');
    var btnRating = document.getElementById('btnRating');

    function highlightStars(n) {
        stars.forEach(function(s) {
            s.classList.toggle('hovered', parseInt(s.getAttribute('data-value')) <= n);
        });
        starLabel.textContent = n > 0 ? getStarLabel(n) : (selectedRating > 0 ? getStarLabel(selectedRating) : '');
    }

    stars.forEach(function(star) {
        star.onmouseenter = function() { highlightStars(parseInt(star.getAttribute('data-value'))); };
        star.onmouseleave = function() { highlightStars(0); updateStarDisplay(); };
        star.onclick = function() {
            selectedRating = parseInt(star.getAttribute('data-value'));
            updateStarDisplay();
            btnRating.disabled = false;
        };
    });

    function updateStarDisplay() {
        stars.forEach(function(s) {
            s.classList.toggle('selected', parseInt(s.getAttribute('data-value')) <= selectedRating);
            s.classList.remove('hovered');
        });
        starLabel.textContent = selectedRating > 0 ? getStarLabel(selectedRating) : '';
    }

    async function loadFeedbackSysInfo() {
        feedbackLoaded = true;
        try {
            var resp = await fetch('api/feedback/sysinfo');
            var info = await resp.json();
            var html = '<dl>';
            var labelKeys = ['addon_version','zone','tier','ha_version','ha_arch','ha_machine'];
            for (var i = 0; i < labelKeys.length; i++) {
                var key = labelKeys[i];
                if (info[key]) html += '<dt>' + t('feedback.sysinfo_labels.' + key, key) + ':</dt><dd>' + info[key] + '</dd>';
            }
            html += '</dl>';
            document.getElementById('sysInfoBox').innerHTML = html;
        } catch (e) {
            document.getElementById('sysInfoBox').textContent = t('feedback.sysinfo_error', 'Could not load system info');
        }
    }

    btnRating.onclick = async function() {
        var msg = document.getElementById('ratingMsg');
        btnRating.disabled = true;
        msg.className = 'feedback-msg';
        msg.textContent = t('feedback.submitting', 'Submitting...');
        try {
            var resp = await fetch('api/feedback/rating', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rating: selectedRating, comment: document.getElementById('ratingComment').value })
            });
            var result = await resp.json();
            if (resp.ok) {
                msg.className = 'feedback-msg success';
                msg.textContent = result.message || t('feedback.thanks_rating', 'Thank you for your rating!');
                selectedRating = 0; updateStarDisplay();
                document.getElementById('ratingComment').value = '';
            } else {
                msg.className = 'feedback-msg error';
                msg.textContent = result.message || result.error || t('feedback.submit_error', 'Could not submit feedback. Please check your connection and try again.');
                btnRating.disabled = false;
            }
        } catch (e) {
            msg.className = 'feedback-msg error';
            msg.textContent = t('errors.connection_error', 'Connection error');
            btnRating.disabled = false;
        }
    };

    document.getElementById('btnBug').onclick = async function() {
        var title = document.getElementById('bugTitle').value.trim();
        var desc = document.getElementById('bugDescription').value.trim();
        var msg = document.getElementById('bugMsg');
        var btn = document.getElementById('btnBug');

        if (!title || !desc) {
            msg.className = 'feedback-msg error';
            msg.textContent = t('feedback.fill_both', 'Please fill in both title and description');
            return;
        }

        btn.disabled = true;
        msg.className = 'feedback-msg';
        msg.textContent = t('feedback.submitting', 'Submitting...');
        try {
            var resp = await fetch('api/feedback/bug', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title, description: desc })
            });
            var result = await resp.json();
            if (resp.ok) {
                msg.className = 'feedback-msg success';
                var text = result.message || t('feedback.thanks_bug', 'Bug report submitted!');
                if (result.issue_url) text += ' <a href="' + result.issue_url + '" target="_blank" style="color:var(--accent)">' + t('feedback.view_issue', 'View issue') + '</a>';
                msg.innerHTML = text;
                document.getElementById('bugTitle').value = '';
                document.getElementById('bugDescription').value = '';
            } else {
                msg.className = 'feedback-msg error';
                msg.textContent = result.message || result.error || t('feedback.bug_submit_error', 'Could not submit bug report. Please check your connection and try again.');
            }
        } catch (e) {
            msg.className = 'feedback-msg error';
            msg.textContent = t('feedback.bug_submit_error', 'Could not submit bug report. Please check your connection and try again.');
        }
        btn.disabled = false;
    };

    loadVersion().then(function() {
        return initI18n(_detectedLocale);
    }).then(loadDashboard);
    </script>
</body>
</html>
