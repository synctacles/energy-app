repos:
  # Block direct commits to main
  - repo: local
    hooks:
      - id: no-main-commits
        name: Block direct main commits
        entry: bash -c 'branch=$(git rev-parse --abbrev-ref HEAD); if [ "$branch" = "main" ]; then echo "ERROR - Direct commits to main blocked. Use feature branch."; exit 1; fi'
        language: system
        always_run: true
        pass_filenames: false

  # Security scan
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-ll", "-r", "synctacles_db/"]
        exclude: "tests/"

  # SQL injection patterns
  - repo: local
    hooks:
      - id: sql-injection-check
        name: SQL injection patterns
        entry: bash -c 'if grep -rn "execute.*f" synctacles_db/ 2>/dev/null | grep -v test; then echo "ERROR - F-string in SQL execute() detected"; exit 1; fi'
        language: system
        pass_filenames: false

  # Secrets check
  - repo: local
    hooks:
      - id: no-secrets
        name: No hardcoded secrets
        entry: bash -c 'if grep -rn "postgresql://.*:.*@" synctacles_db/ 2>/dev/null; then echo "ERROR - Hardcoded database URL detected"; exit 1; fi'
        language: system
        pass_filenames: false

  # Code formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
