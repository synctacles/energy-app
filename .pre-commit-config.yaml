# Pre-commit hooks configuration for Synctacles
# Install with: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # =========================================================================
  # Dependency Scanning - Task #2
  # =========================================================================
  - repo: local
    hooks:
      - id: pip-audit
        name: "Scan dependencies for vulnerabilities"
        entry: bash -c 'pip-audit -r requirements.txt --desc'
        language: system
        files: requirements.*\.txt$
        stages: [commit]
        pass_filenames: false
        always_run: false

  # =========================================================================
  # Code Quality - Pre-launch checks
  # =========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent giant files from being committed
      - id: check-added-large-files
        args: ['--maxkb=5000']
        stages: [commit]

      # Check for merge conflicts
      - id: check-merge-conflict
        stages: [commit]

      # Check YAML syntax
      - id: check-yaml
        args: ['--unsafe']
        stages: [commit]

      # Check JSON syntax
      - id: check-json
        stages: [commit]

      # Ensure files end with newline
      - id: end-of-file-fixer
        stages: [commit]

      # Trim trailing whitespace
      - id: trailing-whitespace
        stages: [commit]

      # Detect private keys
      - id: detect-private-key
        stages: [commit]

  # =========================================================================
  # Python Code Quality
  # =========================================================================
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.12
        stages: [commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.13
    hooks:
      - id: ruff
        args: [--fix]
        stages: [commit]
      - id: ruff-format
        stages: [commit]

  # =========================================================================
  # Security Scanning
  # =========================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ['-c', '.bandit']
        stages: [commit]
        exclude: '^tests/'
