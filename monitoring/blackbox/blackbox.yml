# SYNCTACLES Blackbox Exporter Configuration
# Deployed to: monitoring.synctacles.com (77.42.41.135)
# Last updated: 2026-01-23
#
# Probes for HTTP endpoints and SSL certificates

modules:
  # HTTP 2xx check - verify endpoint returns success status
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 201, 204]
      method: GET
      follow_redirects: true
      fail_if_ssl: false
      fail_if_not_ssl: false
      tls_config:
        insecure_skip_verify: false

  # HTTP POST check (for health endpoints that require POST)
  http_post_2xx:
    prober: http
    timeout: 10s
    http:
      method: POST
      valid_status_codes: [200, 201, 204]

  # SSL certificate check
  ssl_cert:
    prober: tcp
    timeout: 5s
    tcp:
      tls: true
      tls_config:
        insecure_skip_verify: false

  # TCP port check (verify port is open)
  tcp_connect:
    prober: tcp
    timeout: 5s

  # ICMP ping check
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: "ip4"
