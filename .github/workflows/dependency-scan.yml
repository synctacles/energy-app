name: "Dependency Security Scan"

on:
  push:
    branches: [main, develop]
    paths:
      - 'requirements*.txt'
      - '.github/workflows/dependency-scan.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'requirements*.txt'
  schedule:
    # Run daily at 2 AM UTC to catch new vulnerabilities
    - cron: '0 2 * * *'

jobs:
  dependency-scan:
    name: "Scan Dependencies for Vulnerabilities"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt

      - name: "🔍 Scan installed packages"
        id: scan-main
        continue-on-error: true
        run: |
          echo "## Dependency Scan: Installed Packages" >> $GITHUB_STEP_SUMMARY
          pip-audit --format json > pip-audit-main.json || true
          pip-audit --desc
          echo "✅ Scan complete" >> $GITHUB_STEP_SUMMARY


      - name: "📊 Upload scan reports"
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: dependency-scan-reports
          path: |
            pip-audit-*.json
          retention-days: 30

      - name: "❌ Fail if vulnerabilities found"
        if: steps.scan-main.outcome == 'failure'
        run: |
          echo "Vulnerability detected! Review pip-audit output above."
          echo ""
          echo "To fix:"
          echo "  1. Run: pip-audit --fix -r requirements.txt"
          echo "  2. Test the updated dependencies"
          echo "  3. Commit the updated requirements.txt"
          exit 1

  # Optional: Create issue on vulnerability detection
  create-security-issue:
    name: "Report Security Issue"
    runs-on: ubuntu-latest
    needs: dependency-scan
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: "🐛 Create security issue"
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Security: Dependency vulnerabilities detected',
              body: 'Daily dependency scan found vulnerabilities. See workflow run for details.',
              labels: ['security', 'dependencies']
            })
