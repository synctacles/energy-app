name: "CI Pipeline"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: "Build & Test (Go)"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Setup Go"
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: "Vet"
        run: go vet ./...

      - name: "Test"
        run: go test ./... -v -count=1

      - name: "Build energy-addon"
        run: CGO_ENABLED=0 go build -o energy-addon ./cmd/energy-addon/
