name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We love hearing your ideas! Please describe what you'd like to see.

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or improvement
      placeholder: "It would be great if the addon could..."
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: How would you use this feature? What problem does it solve?
      placeholder: "I want to automate my washing machine to run during the cheapest hours..."
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: How important is this for you?
      options:
        - Nice to have
        - Would use regularly
        - Critical for my setup
    validations:
      required: false
